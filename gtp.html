  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truecaller UI Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 80px;
      background-color: #ffffff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
    }

    .sidebar img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .sidebar button {
      background: none;
      border: none;
      font-size: 22px;
      margin: 20px 0;
      cursor: pointer;
    }

    /* Chat area */
    .main {
      flex: 1;
      background-color: #f9f9f9;
      padding: 20px;
    }

    .search-bar {
      background: #fff;
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.05);
    }

    .search-bar input {
      border: none;
      outline: none;
      font-size: 16px;
      flex: 1;
      margin-left: 10px;
    }

    .alert-box {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
    }

    .alert-box p {
      margin: 0;
      color: #333;
    }

    .chat-list {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
    }

    .chat-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .chat-text {
      display: flex;
      flex-direction: column;
    }

    .chat-text strong {
      font-size: 14px;
    }

    .chat-text small {
      color: #666;
    }

    .chat-time {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <img src="https://placehold.co/40x40" alt="User" />
      <button title="Inbox">📥</button>
      <button title="Promotions">💼</button>
    </div>

    <!-- Main Chat Area -->
    <div class="main">

      <!-- Search -->
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" placeholder="Search or start a new chat" />
      </div>

      <!-- Alerts -->
      <div class="alert-box">
        <p><strong>Get alerts for new messages</strong> <br> Turn on desktop notifications</p>
        <span>🔔</span>
      </div>

      <!-- Chat preview -->
      <div class="chat-list">
        <div class="chat-info">
          <img src="https://placehold.co/40x40" alt="Aditya" />
          <div class="chat-text">
            <strong>Aditya Nayar</strong>
            <small>Hahahah this is awesome!</small>
          </div>
        </div>
        <div class="chat-time">10:07 PM</div>
      </div>

    </div>
  </div>

</body>
